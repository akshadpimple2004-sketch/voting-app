name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Lint & Code Quality Check
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Lint Frontend
        run: |
          cd frontend
          npm ci
          # If typescript is configured we check compilation
          npm run build --if-present

      - name: Lint Node Voting Backend
        run: |
          cd backend-vote
          npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Lint Python Flask Results Backend
        run: |
          cd backend-results
          pip install -r requirements.txt
          # Add simple compile syntax check
          python -m py_compile app.py

      - name: Lint Python Worker
        run: |
          cd worker
          pip install -r requirements.txt
          python -m py_compile worker.py

  # Job 2: Build & Push Docker Images to Docker Hub
  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Build and Push Node Voting API
      - name: Build & Push Voting API
        uses: docker/build-push-action@v5
        with:
          context: ./backend-vote
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/voting-app-vote-api:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/voting-app-vote-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and Push Flask Results API
      - name: Build & Push Results API
        uses: docker/build-push-action@v5
        with:
          context: ./backend-results
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/voting-app-results-api:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/voting-app-results-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and Push Python Worker
      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/voting-app-worker:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/voting-app-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and Push Nginx
      - name: Build & Push Nginx Proxy
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/voting-app-nginx:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/voting-app-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and Push Frontend
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/voting-app-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/voting-app-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
